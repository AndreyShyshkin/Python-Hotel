{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- Page Hero -->
<section class="catalog-hero py-5 bg-secondary">
  <div class="container-fluid padding-side" data-aos="fade-up">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">
      <div>
        <h1 class="display-3 fw-normal mb-1">Каталог номерів</h1>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="{% url 'home' %}">Головна</a></li>
            <li class="breadcrumb-item active" aria-current="page">Номери</li>
          </ol>
        </nav>
      </div>
      <p class="mt-3 mt-md-0 mb-0 text-muted">
        Показано <strong>{{ total }}</strong> номер{% if total == 1 %}{% elif total >= 2 and total <= 4 %}и{% else %}ів{% endif %}
      </p>
    </div>
  </div>
</section>

<!-- Catalog Body -->
<section class="padding-large pt-5">
  <div class="container-fluid padding-side">
    <form method="get" action="{% url 'room_list' %}" id="filter-form">
    <div class="row g-5">

      <!-- ===================== SIDEBAR FILTERS ===================== -->
      <aside class="col-lg-3" data-aos="fade-right">

        <!-- Mobile toggle -->
        <button class="btn btn-primary w-100 d-lg-none mb-3" type="button"
                data-bs-toggle="collapse" data-bs-target="#filtersCollapse">
          <svg width="16" height="16" class="me-2"><use xlink:href="#search"></use></svg>
          Фільтри
        </button>

        <div class="collapse d-lg-block" id="filtersCollapse">
          <div class="filter-box bg-secondary rounded-4 p-4 sticky-top" style="top: 100px;">

            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="mb-0 fw-semibold">Фільтри</h5>
              <a href="{% url 'room_list' %}" class="btn btn-sm btn-outline-secondary rounded-pill">Скинути</a>
            </div>

                 <!-- Search -->
            <div class="mb-4">
              <label class="form-label text-uppercase small fw-semibold">Пошук</label>
              <div class="position-relative">
                <input type="text" name="search" id="filter-search" class="form-control rounded-3 pe-5"
                       placeholder="Назва номера…" value="{{ filters.search }}">
                <svg class="position-absolute top-50 end-0 translate-middle-y me-3 text-muted"
                     width="16" height="16"><use xlink:href="#search"></use></svg>
              </div>
            </div>

  <!-- Category -->
            <div class="mb-4">
              <label class="form-label text-uppercase small fw-semibold">Категорія</label>
              <div class="d-flex flex-wrap gap-2">
                <button type="submit" name="category" value=""
                        class="btn btn-sm filter-pill rounded-pill {% if not filters.category_id %}active{% endif %}">
                  Всі
                </button>
                {% for cat in categories %}
                <button type="submit" name="category" value="{{ cat.id }}"
                        class="btn btn-sm filter-pill rounded-pill {% if filters.category_id == cat.id|stringformat:'s' %}active{% endif %}">
                  {{ cat.name }}
                </button>
                {% endfor %}
              </div>
            </div>


     </div><!-- /filter-box -->
        </div>
      </aside>


    </div><!-- /row -->
    </form>
  </div>
</section>



{% endblock %}
