name: Django CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Завантаження кода (Checkout)
        uses: actions/checkout@v4

      - name: Запуск контейнерів через Docker Compose
        run: docker compose up -d --build

      - name: Очікування готовності сервера
        run: sleep 10

      - name: Запуск тестів (Pytest)
        run: docker compose exec -T web pytest